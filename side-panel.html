<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Image Search</title>
  <script src="libs/tailwindcss.js"></script>
</head>

<body class="bg-gray-100">
  <div class="container mx-auto p-4">
    <div class="search-bar mb-4">
      <input type="text" id="search-input" class="w-full px-4 py-2 border rounded-md"
        placeholder="Search for images...">
      <div class="search-options mt-2 text-sm text-gray-600">
        <label class="inline-flex items-center ml-4">
          <input type="checkbox" id="transparent-background" class="form-checkbox">
          <span class="ml-2">Transparent background</span>
        </label>
      </div>
    </div>
    <div id="search-results" class="grid grid-cols-2 gap-4"></div>
  </div>
  <script src="side-panel.js"></script>
</body>

</html>
